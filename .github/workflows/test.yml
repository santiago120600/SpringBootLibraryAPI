name: Run Unit Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: '**/pom.xml'
      - name: Run unit tests
        run: mvn --batch-mode clean test
      - name: Upload test report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: |
            target/site/jacoco/