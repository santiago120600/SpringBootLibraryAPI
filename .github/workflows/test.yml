name: Run Unit Tests
on:
  push:
    branches: [ main ]
    paths:
      - 'library/**'  # Only trigger on changes inside the library directory
  pull_request:
    branches: [ main ]
    paths:
      - 'library/**'
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: '**/pom.xml'
      - name: Run unit tests
        run: mvn --batch-mode clean test